<!-- 3번 : css스타일 - 인라인 스타일 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS스타일-인라인스타일</title>
</head>
<body>
  <h1>인라인 스타일</h1>
  <!-- 인라인 스타일은 우선순위가 가장 높다
   모든 스타일이 태그 안 style 속성에 직접 작성된다 -->
  <span style="color:yellow; background-color: black;">span 요소1</span>
  <span style="color:yellow; background-color: black;">span 요소2</span>
  <p style="color: aqua;">p 요소1</p>
  <p style="color: aqua;">p 요소2</p>
  <div>div 요소1</div>
  <div>div 요소2</div>
</body>
</html>
