<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>defer</title>
</head>
<body>
  <p>defer 속성이 있는 script 태그전 p 태그</p>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      alert("defer 스크립트가 실행된 후 DOM이 준비되었습니다");
    });
  </script>
  <script defer src="https://javascript.info/article/script-async-defer/long.js?speed=1"></script>
  <p>스크립트 뒤 컨텐츠</p>
</body>
</html>

<!-- defer 적용시
- html을 파싱하면서 <p>태그들을 화면에 출력한다
- defer 스크립트는 백그라운드에서 다운로드된다
- 모든 스크립트 실행이 완료되면 DOMContentLoaded 이벤트 발생 -> alert 실행

-- defer 없이 script 태그를 사용하면
- html 파싱 중간에 멈추고 스크립트 다운로드 및 실행이 끝난 후 다시 html을 파싱을 재개한다-->
