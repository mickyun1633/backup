<script>
  const items = document.getElementsByClassName("item");
  console.log(items); //HTMLCollection 

  //HTMLCollection은 forEach 메소드를 바로 사용하지 못한다
  //(HTMLCollection 객체는 forEach메소드에 직접 접근 불가)
  //추가로 사용할 수 있도록 대입해서 사용해야한다
  //HTMLCollection의 prototype에 forEach메소드를 
  // Array의 forEach메소드로 설정하는 한 줄이 반드시 필요하다
  HTMLCollection.prototype.forEach = Array.prototype.forEach;
  
  items.forEach((item) => {
    console.log(item);
  });
// document07.html:94 Uncaught TypeError: items.forEach is not a function
//     at document07.html:94:9
// HTMLCollection은 배열이 아니기 때문에 Array.prototype의 메소드를 상속받지 않음


  
</script>
