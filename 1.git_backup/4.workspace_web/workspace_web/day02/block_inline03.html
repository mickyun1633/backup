<!-- 5번 : CSS스타일 - 외부 스타일 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS스타일 - 외부 스타일</title>
  <link rel="stylesheet" href="./block-inline03.css">
</head>
<body>
  <H1>외부스타일 - id 속성과 class 속성</H1>
  <!-- span#span-id${span 요소$}*2 -->
  <span id="span-id1">span 요소1</span>
  <span id="span-id2">span 요소2</span>
  <!-- div.div-class{div요소$}*2 -->
  <div class="div-class">div 요소1</div>
  <div class="div-class">div 요소2</div>
</body>
</html>
