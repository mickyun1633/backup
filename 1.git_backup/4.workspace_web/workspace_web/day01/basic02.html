<!-- 2번 : a태그, img태그, br 태그, hr 태그 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>a태그와 이미지 태그</title>
</head>
<body>
  <h1>a태그 : 링크태그</h1>
  <a href="https://www.naver.com">네이버</a>
  <a href="https://www.google.com" target="_blank">구글</a>
  <a href="./basic01.html">basic01</a>
  <!-- a 태그의 기본 속성은 href 속성
   href 속성은 url 경로나 파일의 경로를 넣어줘야한다 -->

  <h1>img 태그 : 이미지 태그</h1>
  <img src="./../1.jpg" alt="팔라스" width="150" height="150">
  <img src="./../2.jpg" alt="팔라스">
  <img src="https://static.fetchingapp.co.kr/brands/905b796adcb0405150ce90bd302554bb.jpg">
<!-- img 태그의 기본 속성은 src 속성
src 속성은 이미지 파일의 경로나 링크(이미지의 웹사이트 주소)복사붙여넣기로 넣어줘야한다 -->

</body>
</html>
